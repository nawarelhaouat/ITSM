<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/WEB-INF/templates/layout.xhtml">

    ```
    <ui:define name="title">Configuration SLA</ui:define>


    <ui:define name="breadcrumb">
        <a href="#{request.contextPath}/admin/dashboard.xhtml"
           style="color:var(--text-muted);text-decoration:none;">Dashboard</a>
        &#160;/&#160; <strong>Configuration SLA</strong>
    </ui:define>

    <ui:define name="content">

        <div class="page-header">
            <div>
                <div class="page-title">Configuration SLA</div>
                <div class="page-subtitle">Paramétrage des délais par priorité</div>
            </div>
        </div>

        <div class="alert alert-info" style="margin-bottom:20px;">
            <span>ℹ</span>
            Le SLA définit les délais contractuels de résolution selon la priorité du ticket.
        </div>

        <!-- 4 cartes SLA -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:24px;">

            <!-- CRITIQUE -->
            <div class="card" style="border-top:4px solid var(--prio-critique);">
                <div class="card-header">
                    <span class="badge badge-prio-CRITIQUE" style="font-size:13px;padding:5px 10px;">CRITIQUE</span>
                </div>
                <h:form>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">Délai résolution (heures)</label>
                            <h:inputText value="#{slaBean.slaCritique.delaiHeures}"
                                         styleClass="form-control"
                                         style="font-size:20px;font-weight:700;text-align:center;"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Seuil d'alerte (%)</label>
                            <h:inputText value="#{slaBean.slaCritique.seuilAlertePct}"
                                         styleClass="form-control"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Délai escalade (heures)</label>
                            <h:inputText value="#{slaBean.slaCritique.delaiEscaladeHeures}"
                                         styleClass="form-control"/>
                        </div>
                        <h:commandButton value="Enregistrer"
                                         action="#{slaBean.save(slaBean.slaCritique)}"
                                         styleClass="btn btn-primary w-full"
                                         style="justify-content:center;margin-top:8px;"/>
                    </div>
                </h:form>
            </div>

            <!-- HAUTE -->
            <div class="card" style="border-top:4px solid var(--prio-haute);">
                <div class="card-header">
                    <span class="badge badge-prio-HAUTE" style="font-size:13px;padding:5px 10px;">HAUTE</span>
                </div>
                <h:form>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">Délai résolution (heures)</label>
                            <h:inputText value="#{slaBean.slaHaute.delaiHeures}"
                                         styleClass="form-control"
                                         style="font-size:20px;font-weight:700;text-align:center;"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Seuil d'alerte (%)</label>
                            <h:inputText value="#{slaBean.slaHaute.seuilAlertePct}"
                                         styleClass="form-control"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Délai escalade (heures)</label>
                            <h:inputText value="#{slaBean.slaHaute.delaiEscaladeHeures}"
                                         styleClass="form-control"/>
                        </div>
                        <h:commandButton value="Enregistrer"
                                         action="#{slaBean.save(slaBean.slaHaute)}"
                                         styleClass="btn btn-primary w-full"
                                         style="justify-content:center;margin-top:8px;"/>
                    </div>
                </h:form>
            </div>

            <!-- MOYENNE -->
            <div class="card" style="border-top:4px solid var(--prio-moyenne);">
                <div class="card-header">
                    <span class="badge badge-prio-MOYENNE" style="font-size:13px;padding:5px 10px;">MOYENNE</span>
                </div>
                <h:form>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">Délai résolution (heures)</label>
                            <h:inputText value="#{slaBean.slaMoyenne.delaiHeures}"
                                         styleClass="form-control"
                                         style="font-size:20px;font-weight:700;text-align:center;"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Seuil d'alerte (%)</label>
                            <h:inputText value="#{slaBean.slaMoyenne.seuilAlertePct}"
                                         styleClass="form-control"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Délai escalade (heures)</label>
                            <h:inputText value="#{slaBean.slaMoyenne.delaiEscaladeHeures}"
                                         styleClass="form-control"/>
                        </div>
                        <h:commandButton value="Enregistrer"
                                         action="#{slaBean.save(slaBean.slaMoyenne)}"
                                         styleClass="btn btn-primary w-full"
                                         style="justify-content:center;margin-top:8px;"/>
                    </div>
                </h:form>
            </div>

            <!-- BASSE -->
            <div class="card" style="border-top:4px solid var(--prio-basse);">
                <div class="card-header">
                    <span class="badge badge-prio-BASSE" style="font-size:13px;padding:5px 10px;">BASSE</span>
                </div>
                <h:form>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">Délai résolution (heures)</label>
                            <h:inputText value="#{slaBean.slaBasse.delaiHeures}"
                                         styleClass="form-control"
                                         style="font-size:20px;font-weight:700;text-align:center;"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Seuil d'alerte (%)</label>
                            <h:inputText value="#{slaBean.slaBasse.seuilAlertePct}"
                                         styleClass="form-control"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Délai escalade (heures)</label>
                            <h:inputText value="#{slaBean.slaBasse.delaiEscaladeHeures}"
                                         styleClass="form-control"/>
                        </div>
                        <h:commandButton value="Enregistrer"
                                         action="#{slaBean.save(slaBean.slaBasse)}"
                                         styleClass="btn btn-primary w-full"
                                         style="justify-content:center;margin-top:8px;"/>
                    </div>
                </h:form>
            </div>

        </div>

        <!-- Récapitulatif -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Récapitulatif</span>
            </div>
            <table class="itsm-table">
                <thead>
                <tr>
                    <th>Priorité</th><th>Délai résolution</th>
                    <th>Seuil alerte</th><th>Délai escalade</th>
                </tr>
                </thead>
                <tbody>
                <ui:repeat value="#{slaBean.allSlaConfigs}" var="s">
                    <tr>
                        <td><span class="badge badge-prio-#{s.priorite}"><h:outputText value="#{s.priorite}"/></span></td>
                        <td><strong><h:outputText value="#{s.delaiHeures}"/>h</strong></td>
                        <td><h:outputText value="#{s.seuilAlertePct}"/>%</td>
                        <td><h:outputText value="#{s.delaiEscaladeHeures}"/>h</td>
                    </tr>
                </ui:repeat>
                </tbody>
            </table>
        </div>

        <h:messages id="messages" styleClass="alert alert-success"
                    layout="list" style="margin-top:16px;"/>

    </ui:define>
    ```

</ui:composition>

</html>
