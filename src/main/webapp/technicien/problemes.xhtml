<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
<ui:composition template="/WEB-INF/templates/layoutTechnicien.xhtml">
<ui:define name="title">Problèmes - ITSM</ui:define>
    <ui:define name="head-extra">
<style>
.page-header{background:#fff;padding:24px;border-radius:15px;margin-bottom:25px;}
.page-title{font-size:22px;font-weight:700;color:#1E293B;margin-bottom:4px;}
.page-subtitle{font-size:13px;color:#6D28D9;}
.card{background:#fff;border-radius:15px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E2E8F0;overflow:hidden;margin-bottom:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;}
.card-title{font-size:14px;font-weight:600;color:#1E293B;}
.itsm-table{width:100%;border-collapse:collapse;}
.itsm-table thead tr{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);}
.itsm-table th{padding:13px 15px;text-align:left;font-size:11px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.5px;}
.itsm-table tbody tr{border-bottom:1px solid #F5F3FF;transition:background .2s;}
.itsm-table tbody tr:hover{background:#F5F3FF;}
.itsm-table td{padding:13px 15px;font-size:13px;vertical-align:middle;}
/* ===== BADGE ===== */
.badge {
    color: #343a40;
    font-size: 11px;
    text-transform:uppercase;
}/* ===== BUTTONS ===== */
.btn {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid #dee2e6;
    background: #ffffff;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    background: #f8f9fa;
}

.btn-primary {
    background: #212529;
    color: #ffffff;
    border: none;
}

.btn-primary:hover {
    background: #000;
}

.btn-danger {
    background: #343a40;
    color: #fff;
    border: none;
}
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-size:14px;font-weight:700;color:#7C3AED;}
.text-muted{color:#94A3B8;} .text-sm{font-size:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(9,30,66,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
.modal-header{padding:16px 20px;border-bottom:1px solid #EDE9FE;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#F5F3FF,#EDE9FE);}
.modal-title{font-size:15px;font-weight:700;color:#7C3AED;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94A3B8;}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid #EDE9FE;display:flex;justify-content:flex-end;gap:8px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:#7C3AED;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.form-control{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #DDD6FE;border-radius:8px;background:#fff;color:#333;outline:none;transition:border .2s;}
.form-control:focus{border-color:#7C3AED;}
textarea.form-control{resize:vertical;min-height:80px;}
</style>
    </ui:define>
<ui:define name="breadcrumb">
    <a href="#{request.contextPath}/technicien/dashboard.xhtml" style="color:var(--text-muted);text-decoration:none;">Dashboard</a>
    &#160;/&#160; <strong>Problèmes</strong>
</ui:define>
<ui:define name="content">
    <div class="page-header">
        <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div class="page-title">Gestion des Problèmes</div>
                <div class="page-subtitle">Causes racines des incidents récurrents — Root Cause Analysis</div>
            </div>
            <button class="btn btn-primary" onclick="document.getElementById('modalProbleme').style.display='flex'">
                + Nouveau problème
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Liste des problèmes</span>
            <span class="badge" style="background:#EDE9FE;color:#7C3AED;font-size:13px;padding:6px 14px;">
                <h:outputText value="#{problemeBean.allProblemes.size()}"/> problème(s)
            </span>
        </div>
        <table class="itsm-table">
            <thead><tr><th>#</th><th>Titre</th><th>Statut</th><th>Cause Racine</th><th>Workaround</th><th>Date création</th></tr></thead>
            <tbody>
            <ui:repeat value="#{problemeBean.allProblemes}" var="p">
                <tr>
                    <td><span class="text-muted text-sm">#<h:outputText value="#{p.id}"/></span></td>
                    <td><span style="font-weight:600;color:#7C3AED;"><h:outputText value="#{p.titre}"/></span></td>
                    <td>
                        <span class="badge">
                            <h:outputText value="#{p.statut}"/>
                        </span>
                    </td>
                    <td>
                        <h:panelGroup rendered="#{p.causeRacine != null and p.causeRacine != ''}">
                            <span class="text-sm" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">
                                <h:outputText value="#{p.causeRacine}"/>
                            </span>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{p.causeRacine == null or p.causeRacine == ''}">
                            <span class="text-muted text-sm">En investigation...</span>
                        </h:panelGroup>
                    </td>
                    <td>
                        <h:panelGroup rendered="#{p.workaround != null and p.workaround != ''}">
                            <span class="text-sm">Disponible</span>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{p.workaround == null or p.workaround == ''}">
                            <span class="text-muted text-sm">Non défini</span>
                        </h:panelGroup>
                    </td>
                    <td><span class="text-muted text-sm"><h:outputText value="#{p.dateCreation}"><f:convertDateTime pattern="dd/MM/yyyy"/></h:outputText></span></td>
                </tr>
            </ui:repeat>
            <c:if test="#{empty problemeBean.allProblemes}">
                <tr><td colspan="6"><div class="empty-state"><div class="empty-icon"></div><div class="empty-title">Aucun problème enregistré</div></div></td></tr>
            </c:if>
            </tbody>
        </table>
    </div>

    <!-- Modal Nouveau Problème -->
    <div id="modalProbleme" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">Nouveau problème</span>
                <button class="modal-close" onclick="document.getElementById('modalProbleme').style.display='none'">✕</button>
            </div>
            <h:form>
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Titre <span style="color:red;">*</span></label>
                        <h:inputText value="#{problemeBean.nouveauTitre}" styleClass="form-control" placeholder="Titre du problème..."/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <h:inputTextarea value="#{problemeBean.nouvelleDescription}" styleClass="form-control" rows="3" placeholder="Description détaillée..."/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cause racine (RCA)</label>
                        <h:inputTextarea value="#{problemeBean.nouvelleCauseRacine}" styleClass="form-control" rows="3" placeholder="Cause identifiée..."/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Workaround (solution temporaire)</label>
                        <h:inputTextarea value="#{problemeBean.nouveauWorkaround}" styleClass="form-control" rows="2" placeholder="Solution de contournement..."/>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('modalProbleme').style.display='none'">Annuler</button>
                    <h:commandButton value="Créer le problème" action="#{problemeBean.creerProbleme}" styleClass="btn btn-primary"/>
                </div>
            </h:form>
        </div>
    </div>
</ui:define>
</ui:composition>
</html>
