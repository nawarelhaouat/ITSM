<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>ITSM — Connexion</title> <link rel="preconnect" href="https://fonts.googleapis.com"/> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet name="css/itsm-theme.css"/>
</h:head>

<h:body styleClass="login-page"> <div class="login-card"> <div class="login-header"> <div class="login-logo">
    <h:graphicImage name="logo.png" library="images" styleClass="logo-img"/> </div> <div class="login-subtitle">IT Service Management</div> </div> <div class="login-body">
    <h:panelGroup rendered="#{loginBean.errorMessage != null and loginBean.errorMessage != ''}"> <div class="login-error"> <span>⚠</span>
        <h:outputText value="#{loginBean.errorMessage}"/> </div>
    </h:panelGroup>

    ```
    <h:form id="loginForm">
        <div class="form-group">
            <label class="form-label" for="email">
                Adresse Email <span class="required">*</span>
            </label>
            <h:inputText id="email" value="#{loginBean.email}"
                         styleClass="form-control"
                         placeholder="votre@email.com"
                         required="true"/>
            <h:message for="email" styleClass="text-sm" style="color:red"/>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                Mot de passe <span class="required">*</span>
            </label>
            <h:inputSecret id="password" value="#{loginBean.password}"
                           styleClass="form-control"
                           placeholder="••••••••"
                           required="true"/>
            <h:message for="password" styleClass="text-sm" style="color:red"/>
        </div>

        <div style="margin-top: 20px;">
            <h:commandButton value="Se connecter"
                             action="#{loginBean.login}"
                             styleClass="btn btn-primary w-full"
                             style="justify-content:center; font-size:14px; padding:10px 16px;"/>
        </div>
    </h:form>
</div>
</div>
    ```

</h:body>

</html>
