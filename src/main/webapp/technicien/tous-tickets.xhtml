<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
<ui:composition template="/WEB-INF/templates/layoutTechnicien.xhtml">
<ui:define name="title">Tous les tickets - ITSM</ui:define>
<style>
.page-header{background:#fff;padding:0 0 20px;margin-bottom:24px;border-bottom:1px solid #F1F5F9;}
.page-title{font-size:22px;font-weight:700;color:#1E293B;margin-bottom:4px;}
.page-subtitle{font-size:13px;color:#6B5B95;}
.card{background:#fff;border-radius:15px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E2E8F0;overflow:hidden;margin-bottom:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;}
.card-title{font-size:14px;font-weight:600;color:#1E293B;}
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid #EEF2FF;}
.filter-select{padding:8px 12px;font-size:13px;border:1.5px solid #C7D2FE;border-radius:8px;background:#fff;color:#4338CA;cursor:pointer;outline:none;}
.itsm-table{width:100%;border-collapse:collapse;}
.itsm-table thead tr{background:linear-gradient(135deg,#F5F3FF,#EEF2FF);}
.itsm-table th{padding:13px 15px;text-align:left;font-size:11px;font-weight:700;color:#4338CA;text-transform:uppercase;letter-spacing:.5px;}
.itsm-table tbody tr{border-bottom:1px solid #F5F3FF;transition:background .2s;}
.itsm-table tbody tr:hover{background:#F5F3FF;}
.itsm-table td{padding:13px 15px;font-size:13px;vertical-align:middle;}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;}
.badge-prio-CRITIQUE{background:linear-gradient(135deg,#FF6B6B,#FF4A5E);color:#fff;}
.badge-prio-HAUTE{background:linear-gradient(135deg,#FFA500,#FFD700);color:#FF4500;}
.badge-prio-MOYENNE{background:#87CEEB;color:#1565C0;}
.badge-prio-BASSE{background:#90EE90;color:#228B22;}
.badge-status-OUVERT{background:#DEEBFF;color:#0052CC;} .badge-status-ASSIGNE{background:#EAE6FF;color:#6554C0;}
.badge-status-EN_COURS{background:#FFF0E6;color:#FF8B00;} .badge-status-ESCALADE{background:#FFEBE6;color:#DE350B;}
.badge-status-RESOLU{background:#E3FCEF;color:#006644;} .badge-status-CLOTURE{background:#F4F5F7;color:#6B778C;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-decoration:none;text-transform:uppercase;}
.btn-primary{background:#4F46E5;color:#fff;border:1px solid #4338CA;}
.btn-sm{padding:5px 10px;font-size:11px;}
.sla-bar-track{background:#EEF2FF;height:8px;border-radius:4px;overflow:hidden;display:inline-block;}
.sla-bar-fill{height:100%;border-radius:4px;}
.sla-bar-fill.ok{background:linear-gradient(90deg,#10B981,#34D399);}
.sla-bar-fill.warn{background:linear-gradient(90deg,#F59E0B,#FBBF24);}
.sla-bar-fill.danger{background:linear-gradient(90deg,#EF4444,#F87171);}
.text-muted{color:#94A3B8;} .text-sm{font-size:12px;}
.empty-state{text-align:center;padding:40px 20px;}
.empty-title{font-size:14px;font-weight:700;color:#4338CA;}
</style>
<ui:define name="breadcrumb">
    <a href="#{request.contextPath}/technicien/dashboard.xhtml" style="color:var(--text-muted);text-decoration:none;">Dashboard</a>
    &#160;/&#160; <strong>Tous les tickets</strong>
</ui:define>
<ui:define name="content">
    <div class="page-header">
        <div class="page-title">Tous les tickets</div>
        <div class="page-subtitle">Consultation de l'ensemble des tickets du système</div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">Liste complète</span>
            <span class="badge" style="background:#EEF2FF;color:#4338CA;font-size:13px;padding:6px 14px;">
                <h:outputText value="#{ticketBean.allTickets.size()}"/> tickets
            </span>
        </div>
        <table class="itsm-table">
            <thead><tr><th>#</th><th>Titre</th><th>Déclarant</th><th>Technicien</th><th>Priorité</th><th>Statut</th><th>SLA</th><th>Date</th><th>Détail</th></tr></thead>
            <tbody>
            <ui:repeat value="#{ticketBean.allTickets}" var="t">
                <tr>
                    <td><span class="text-muted text-sm">#<h:outputText value="#{t.id}"/></span></td>
                    <td><a href="#{request.contextPath}/technicien/ticket-detail.xhtml?id=#{t.id}" style="color:#4338CA;text-decoration:none;font-weight:600;"><h:outputText value="#{t.titre}"/></a></td>
                    <td><h:outputText value="#{t.declarant.prenom}"/> <h:outputText value="#{t.declarant.nom}"/></td>
                    <td>
                        <h:panelGroup rendered="#{t.technicien != null}">
                            <h:outputText value="#{t.technicien.prenom}"/> <h:outputText value="#{t.technicien.nom}"/>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{t.technicien == null}">
                            <span class="text-muted">Non assigné</span>
                        </h:panelGroup>
                    </td>
                    <td><span class="badge badge-prio-#{t.priorite}"><h:outputText value="#{t.priorite}"/></span></td>
                    <td><span class="badge badge-status-#{t.statut}"><h:outputText value="#{t.statut}"/></span></td>
                    <td>
                        <div class="sla-bar-track" style="width:80px;">
                            <div class="sla-bar-fill #{t.slaPercent >= 80 ? 'danger' : (t.slaPercent >= 50 ? 'warn' : 'ok')}" style="width:#{t.slaPercent}%;"></div>
                        </div>
                        <span class="text-muted text-sm"> <h:outputText value="#{t.slaPercent}"/>%</span>
                    </td>
                    <td><span class="text-muted text-sm"><h:outputText value="#{t.dateCreation}"><f:convertDateTime pattern="dd/MM/yyyy"/></h:outputText></span></td>
                    <td><a href="#{request.contextPath}/technicien/ticket-detail.xhtml?id=#{t.id}" class="btn btn-primary btn-sm">Voir</a></td>
                </tr>
            </ui:repeat>
            <c:if test="#{empty ticketBean.allTickets}">
                <tr><td colspan="9"><div class="empty-state"><div class="empty-title">Aucun ticket trouvé</div></div></td></tr>
            </c:if>
            </tbody>
        </table>
    </div>
</ui:define>
</ui:composition>
</html>
