<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
<ui:composition template="/WEB-INF/templates/layoutManager.xhtml">
<ui:define name="title">Escalades - Manager - ITSM</ui:define>
    <ui:define name="head-extra">
<style>
.page-header{background:#fff;padding:24px;border-radius:15px;margin-bottom:25px;}
.page-title{font-size:22px;font-weight:700;color:#1E293B;margin-bottom:4px;}
.page-subtitle{font-size:13px;color:#991B1B;}
.card{background:#fff;border-radius:15px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E2E8F0;overflow:hidden;margin-bottom:20px;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;}
.card-title{font-size:14px;font-weight:600;color:#1E293B;}
.itsm-table{width:100%;border-collapse:collapse;}
.itsm-table thead tr{background:linear-gradient(135deg,#FEF2F2,#FFF7ED);}
.itsm-table th{padding:13px 15px;text-align:left;font-size:11px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:.5px;}
.itsm-table tbody tr{border-bottom:1px solid #FEF2F2;transition:background .2s;}
.itsm-table tbody tr:hover{background:#FFF5F5;}
.itsm-table td{padding:13px 15px;font-size:13px;vertical-align:middle;}
.badge {\
color: #343a40;
    font-size: 11px;
}
/* ===== LINKS ===== */
a {
    color: #212529;
    text-decoration: none;
    font-weight: 500;
}

/* ===== BUTTONS ===== */
.btn {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid #dee2e6;
    background: #ffffff;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    background: #f8f9fa;
}

.btn-primary {
    background: #212529;
    color: #ffffff;
    border: none;
}

.btn-primary:hover {
    background: #000;
}

.btn-danger {
    background: #343a40;
    color: #fff;
    border: none;
}
/* ===== SLA ===== */
.sla-bar-track {
    background: #e9ecef;
    height: 6px;
    border-radius: 4px;
}

.sla-bar-fill { background: #212529; }
.text-muted{color:#94A3B8;} .text-sm{font-size:12px;}
.empty-state{text-align:center;padding:40px 20px;}
.empty-title{font-size:14px;font-weight:700;color:#10B981;}
.modal-overlay{position:fixed;inset:0;background:rgba(9,30,66,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
.modal-header{padding:16px 20px;border-bottom:1px solid #FEE2E2;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#FEF2F2,#FEE2E2);}
.modal-title{font-size:15px;font-weight:700;color:#DC2626;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94A3B8;}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid #FEE2E2;display:flex;justify-content:flex-end;gap:8px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:#DC2626;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.form-control{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #FECACA;border-radius:8px;background:#fff;color:#333;outline:none;}
select.form-control{cursor:pointer;}
</style>
    </ui:define>
<ui:define name="breadcrumb">
    <a href="#{request.contextPath}/manager/dashboard.xhtml" style="color:var(--text-muted);text-decoration:none;">Dashboard</a>
    &#160;/&#160; <strong>Escalades</strong>
</ui:define>
<ui:define name="content">
    <div class="page-header">
        <div class="page-title">Gestion des Escalades</div>
        <div class="page-subtitle">Incidents critiques nécessitant votre intervention en tant que Manager</div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">Tickets escaladés</span>
            <span class="badge">
                <h:outputText value="#{managerTicketBean.ticketsEscalades.size()}"/> escalade(s)
            </span>
        </div>
        <table class="itsm-table">
            <thead><tr><th>#</th><th>Titre</th><th>Priorité</th><th>Technicien</th><th>Déclarant</th><th>SLA</th><th>Échéance</th><th>Actions</th></tr></thead>
            <tbody>
            <ui:repeat value="#{managerTicketBean.ticketsEscalades}" var="t">
                <tr>
                    <td><span class="text-muted text-sm">#<h:outputText value="#{t.id}"/></span></td>
                    <td><a href="#{request.contextPath}/manager/ticket-detail.xhtml?id=#{t.id}" style="color:#3730A3;text-decoration:none;font-weight:700;"><h:outputText value="#{t.titre}"/></a></td>
                    <td><span class="badge"><h:outputText value="#{t.priorite}"/></span></td>
                    <td>
                        <h:panelGroup rendered="#{t.technicien != null}"><h:outputText value="#{t.technicien.prenom}"/> <h:outputText value="#{t.technicien.nom}"/></h:panelGroup>
                        <h:panelGroup rendered="#{t.technicien == null}"><span class="text-muted">Non assigné</span></h:panelGroup>
                    </td>
                    <td><h:outputText value="#{t.declarant.prenom}"/> <h:outputText value="#{t.declarant.nom}"/></td>
                    <td>
                        <div class="sla-bar-track" style="width:80px;"><div class="sla-bar-fill" style="width:#{t.slaPercent}%;"></div></div>
                        <span style="color:#3730A3;font-size:12px;font-weight:700;"> <h:outputText value="#{t.slaPercent}"/>%</span>
                    </td>
                    <td><span class="text-sm text-muted"><h:outputText value="#{t.dateLimiteSla}"><f:convertDateTime pattern="dd/MM/yyyy HH:mm"/></h:outputText></span></td>
                    <td style="display:flex;gap:6px;">
                        <a href="#{request.contextPath}/manager/ticket-detail.xhtml?id=#{t.id}" class="btnbtn-sm">Gérer</a>
                    </td>
                </tr>
            </ui:repeat>
            <c:if test="#{empty managerTicketBean.ticketsEscalades}">
                <tr><td colspan="8"><div class="empty-state"><div style="font-size:48px;margin-bottom:12px;"></div><div class="empty-title">Aucun ticket escaladé</div></div></td></tr>
            </c:if>
            </tbody>
        </table>
    </div>
</ui:define>
</ui:composition>
</html>
